<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
<defs>
<pattern id="stippleRind" patternUnits="userSpaceOnUse" width="10" height="10" viewBox="0 0 10 10">
<circle cx="2" cy="2" r="1.5" fill="#D97726"/>
<circle cx="7" cy="3" r="1.3" fill="#D97726"/>
<circle cx="5" cy="7" r="1.7" fill="#D97726"/>
<circle cx="9" cy="8" r="1.1" fill="#D97726"/>
<rect width="10" height="10" fill="#F9B97A" opacity="1"/>
</pattern>
<pattern id="stippleLeaf" patternUnits="userSpaceOnUse" width="8" height="8" viewBox="0 0 8 8">
<circle cx="1" cy="1" r="1" fill="#3D7A52"/>
<circle cx="5" cy="2" r="0.8" fill="#3D7A52"/>
