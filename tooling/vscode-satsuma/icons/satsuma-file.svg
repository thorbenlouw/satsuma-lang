  <line x1="-30" y1="0" x2="-360" y2="0"/>
  <line x1="30" y1="0" x2="360" y2="0"/>
  <line x1="-21" y1="-21" x2="-254" y2="-254"/>
  <line x1="21" y1="21" x2="254" y2="254"/>
  <line x1="-21" y1="21" x2="-254" y2="254"/>
  <line x1="21" y1="-21" x2="254" y2="-254"/>
  <circle cx="0" cy="0" r="40" fill="white"/>
</g>
<circle r="360" fill="transparent"  stroke="#D97726" stroke-width="30"/>
</g>

</svg>
