name: Deploy Site

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Resolve version from VERSION file (falls back to git tag)
        id: version
        run: |
          if [ -f VERSION ]; then
            TAG="v$(cat VERSION | tr -d '[:space:]')"
          else
            TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo 'v0.0.0')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $TAG"

      - name: Write version data for Eleventy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "{\"version\":\"$TAG\",\"version_tag\":\"$TAG\"}" > site/_data/site.json

      - name: Copy diary entries and generate manifest
        run: |
          mkdir -p site/satsuma-diaries/content
          cp -rf satsuma-diaries/. site/satsuma-diaries/
          python3 scripts/generate-diary-manifest.py

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build site with Eleventy
        run: cd site && npx @11ty/eleventy

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site
      - id: deployment
        uses: actions/deploy-pages@v4
