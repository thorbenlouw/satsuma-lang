name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install all packages
        run: npm run ci:all

      - name: Cache workspace
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

      - run: npm run lint

  satsuma-cli:
    name: Satsuma CLI
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/satsuma-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

      - name: Run CLI tests
        run: npm test

  parser:
    name: Tree-sitter parser
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/tree-sitter-satsuma
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

      - name: Generate parser
        run: npm run generate

      - name: Check generated sources are up to date
        run: |
          if ! git diff --exit-code src/; then
            echo "::error::Generated parser sources are out of date. Run 'npm run generate' in tooling/tree-sitter-satsuma/ and commit the result."
            exit 1
          fi

      - name: Check grammar conflicts are documented
        run: |
          count=$(sed -n '/conflicts:.*=>/,/^  \]/p' grammar.js | grep -c '^\s*\[\$\.')
          expected=$(grep -v '^\s*;' CONFLICTS.expected | grep -v '^\s*$' | head -1)
          echo "Grammar conflicts: $count (expected: $expected)"
          if [ "$count" != "$expected" ]; then
            echo "::error::Grammar conflict count changed: expected $expected, got $count"
            echo "If intentional, update CONFLICTS.expected to $count and document the change."
            exit 1
          fi

      - name: Run corpus tests
        run: ../../scripts/tree-sitter-local.sh test

      - name: Run fixture tests
        run: python3 scripts/test_fixtures.py

      - name: Run CST consumer unit tests
        run: python3 scripts/test_cst_summary.py

      - name: Run smoke tests (parse all examples)
        run: python3 scripts/test_smoke_summary.py

      - name: Audit npm dependencies
        run: npm audit --omit=dev

  vscode-extension:
    name: VS Code extension
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/vscode-satsuma
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

      - name: Validate manifest and grammar
        run: npm run validate

      - name: Run fixture and golden tests
        run: npm test

      - name: Build extension (client + server + webview)
        run: npm run build

      - name: Run LSP server tests
        run: npm run test:lsp

      - name: Audit npm dependencies
        run: npm audit --omit=dev

  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
