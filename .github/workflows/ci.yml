name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install all packages
        run: npm run ci:all

      - name: Build satsuma-core
        working-directory: tooling/satsuma-core
        run: npm run build

      - name: Build tree-sitter WASM (needed by CLI and VS Code)
        working-directory: tooling/tree-sitter-satsuma
        run: node_modules/.bin/tree-sitter build --wasm . -o tree-sitter-satsuma.wasm

      - name: Copy WASM into CLI dist (prebuild ran before WASM existed)
        working-directory: tooling/satsuma-cli
        run: npm run prebuild && tsc

      - name: Build satsuma-viz (needed by VS Code extension webview)
        working-directory: tooling/satsuma-viz
        run: npm run build

      - name: Cache workspace
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/satsuma-cli/dist
            tooling/satsuma-core/dist
            tooling/satsuma-viz/node_modules
            tooling/satsuma-viz/dist
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/tree-sitter-satsuma/tree-sitter-satsuma.wasm
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/satsuma-cli/dist
            tooling/satsuma-core/dist
            tooling/satsuma-viz/node_modules
            tooling/satsuma-viz/dist
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/tree-sitter-satsuma/tree-sitter-satsuma.wasm
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

      - run: npm run lint

  satsuma-cli:
    name: Satsuma CLI
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/satsuma-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/satsuma-cli/dist
            tooling/satsuma-core/dist
            tooling/satsuma-viz/node_modules
            tooling/satsuma-viz/dist
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/tree-sitter-satsuma/tree-sitter-satsuma.wasm
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

      - name: Run CLI tests
        run: |
          mkdir -p ../../test-results
          npm run pretest
          node --import ./test/setup.js --test \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=../../test-results/cli.xml \
            test/**/*.test.js

      - name: Check example corpus formatting
        run: node dist/index.js fmt --check ../../examples/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cli
          path: test-results/cli.xml

  parser:
    name: Tree-sitter parser
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/tree-sitter-satsuma
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/satsuma-cli/dist
            tooling/satsuma-core/dist
            tooling/satsuma-viz/node_modules
            tooling/satsuma-viz/dist
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/tree-sitter-satsuma/tree-sitter-satsuma.wasm
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

      - name: Generate parser
        run: npm run generate

      - name: Check generated sources are up to date
        run: |
          if ! git diff --exit-code src/; then
            echo "::error::Generated parser sources are out of date. Run 'npm run generate' in tooling/tree-sitter-satsuma/ and commit the result."
            exit 1
          fi

      - name: Check grammar conflicts are documented
        run: |
          count=$(sed -n '/conflicts:.*=>/,/^  \]/p' grammar.js | grep -c '^\s*\[\$\.' || true)
          expected=$(grep -v '^\s*;' CONFLICTS.expected | grep -v '^\s*$' | head -1)
          echo "Grammar conflicts: $count (expected: $expected)"
          if [ "$count" != "$expected" ]; then
            echo "::error::Grammar conflict count changed: expected $expected, got $count"
            echo "If intentional, update CONFLICTS.expected to $count and document the change."
            exit 1
          fi

      - name: Run corpus tests
        run: node_modules/.bin/tree-sitter test

      - name: Install pytest
        run: pip install pytest

      - name: Run Python tests (fixtures, CST, smoke)
        run: python3 -m pytest scripts/ --junitxml=../../test-results/parser.xml -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-parser
          path: test-results/parser.xml

  vscode-extension:
    name: VS Code extension
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/vscode-satsuma
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            tooling/satsuma-cli/node_modules
            tooling/satsuma-cli/src/generated
            tooling/satsuma-cli/dist
            tooling/satsuma-core/dist
            tooling/satsuma-viz/node_modules
            tooling/satsuma-viz/dist
            tooling/tree-sitter-satsuma/node_modules
            tooling/tree-sitter-satsuma/build
            tooling/tree-sitter-satsuma/tree-sitter-satsuma.wasm
            tooling/vscode-satsuma/node_modules
            tooling/vscode-satsuma/server/node_modules
          key: workspace-${{ github.sha }}

      - name: Validate manifest and grammar
        run: npm run validate

      - name: Run fixture and golden tests
        run: npm test

      - name: Build extension (client + server + webview)
        run: npm run build

      - name: Build satsuma-cli (needed by LSP formatting provider)
        working-directory: tooling/satsuma-cli
        run: npm run build

      - name: Build tree-sitter WASM for LSP tests
        working-directory: tooling/tree-sitter-satsuma
        run: node_modules/.bin/tree-sitter build --wasm . -o tree-sitter-satsuma.wasm

      - name: Run LSP server tests
        run: |
          mkdir -p ../../test-results
          cd server && npm run pretest && node --test \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=../../../test-results/lsp.xml \
            test/**/*.test.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-vscode
          path: test-results/lsp.xml

  excel-skill:
    name: Excel-to-Satsuma skill
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/excel-to-satsuma/scripts
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest openpyxl

      - name: Run skill tests
        run: python3 -m pytest test_excel_tool.py --junitxml=../../../test-results/excel-skill.xml -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-excel-skill
          path: test-results/excel-skill.xml

  test-report:
    name: Test report
    if: always()
    needs: [satsuma-cli, parser, vscode-extension, excel-skill]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true
          path: test-results

      - name: Publish test report
        uses: dorny/test-reporter@v2
        with:
          name: Test Results
          path: test-results/*.xml
          reporter: java-junit
          fail-on-empty: false

  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
