name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-13
            platform: darwin-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: tooling/stm-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build tree-sitter-stm native bindings
        working-directory: tooling/tree-sitter-stm
        run: npm ci

      - name: Install stm-cli dependencies
        run: npm ci

      - name: Bundle for distribution
        run: |
          # Replace file: symlink with actual copy (includes prebuilt native addon)
          rm -rf node_modules/tree-sitter-stm
          cp -rf ../tree-sitter-stm node_modules/tree-sitter-stm

          # Remove dev-only / non-runtime files from the bundled copy
          rm -rf node_modules/tree-sitter-stm/{test,scripts,.beads,docs,queries,examples}
          rm -rf node_modules/tree-sitter-stm/node_modules

          # Bundle all dependencies into the tarball so consumers skip native compilation
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.bundleDependencies = true;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          npm pack
          mv stm-cli-*.tgz stm-cli-${{ matrix.platform }}.tgz

      - uses: actions/upload-artifact@v4
        with:
          name: stm-cli-${{ matrix.platform }}
          path: tooling/stm-cli/stm-cli-${{ matrix.platform }}.tgz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Delete existing latest release and tag if present
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          cat > notes.md <<'EOF'
          Auto-built from the latest `main` branch.

          **Install:**
          ```bash
          # macOS (Apple Silicon)
          npm install -g https://github.com/${{ github.repository }}/releases/download/latest/stm-cli-darwin-arm64.tgz

          # macOS (Intel)
          npm install -g https://github.com/${{ github.repository }}/releases/download/latest/stm-cli-darwin-x64.tgz

          # Linux (x64)
          npm install -g https://github.com/${{ github.repository }}/releases/download/latest/stm-cli-linux-x64.tgz
          ```
          EOF

          gh release create latest \
            --title "Latest build" \
            --notes-file notes.md \
            --prerelease \
            stm-cli-*.tgz
