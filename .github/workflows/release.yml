name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g. v0.4.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  security:
    name: Security gate
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write

  build:
    needs: [security]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/satsuma-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install all dependencies
        working-directory: .
        run: npm run ci:all

      - name: Build WASM parser
        working-directory: tooling/tree-sitter-satsuma
        run: ../../scripts/tree-sitter-local.sh build --wasm . -o tree-sitter-satsuma.wasm

      - name: Bundle for distribution
        shell: bash
        run: |
          # Bundle all dependencies into the tarball so consumers skip install
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.bundleDependencies = true;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          chmod +x dist/index.js
          npm pack
          mv satsuma-cli-*.tgz satsuma-cli.tgz
          node scripts/verify-pack.js

      - uses: actions/upload-artifact@v7
        with:
          name: satsuma-cli
          path: tooling/satsuma-cli/satsuma-cli.tgz

  vsix:
    needs: [security]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/vscode-satsuma
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install all dependencies
        working-directory: .
        run: npm run ci:all

      - name: Build WASM parser
        working-directory: tooling/tree-sitter-satsuma
        run: npx tree-sitter build --wasm

      - name: Build satsuma-viz (needed by webview bundle)
        working-directory: tooling/satsuma-viz
        run: npm run build

      - name: Build and package .vsix
        run: |
          # Build client + server + webview bundles (copies .wasm + highlights.scm)
          npm run build

          # Package the extension (--allow-missing-repository for monorepo layout)
          npx @vscode/vsce package --no-dependencies -o vscode-satsuma.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: vscode-satsuma-vsix
          path: tooling/vscode-satsuma/vscode-satsuma.vsix

  release:
    needs: [build, vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract release notes from changelog
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          node <<'NODE' > release-notes.md
          const fs = require('fs');
          const tag = process.env.RELEASE_TAG;
          const lines = fs.readFileSync('CHANGELOG.md', 'utf8').split('\n');
          const heading = `## ${tag} — `;
          const startIndex = lines.findIndex((line) => line.startsWith(heading));

          if (startIndex === -1) {
            console.error(`No changelog section found for ${tag}`);
            process.exit(1);
          }

          let endIndex = lines.length;
          for (let index = startIndex + 1; index < lines.length; index += 1) {
            if (lines[index].startsWith('## ')) {
              endIndex = index;
              break;
            }
          }

          const notes = lines.slice(startIndex + 1, endIndex).join('\n').trim();
          if (!notes) {
            console.error(`Changelog section for ${tag} is empty`);
            process.exit(1);
          }

          process.stdout.write(`${notes}\n`);
          NODE

      - name: Create tagged release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            satsuma-cli.tgz \
            vscode-satsuma.vsix

      - name: Update latest release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Delete existing latest release and tag if present
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          cat > notes.md <<'EOF'
          Auto-built from the latest `main` branch.

          **Install CLI:**
          ```bash
          npm install -g https://github.com/${{ github.repository }}/releases/download/latest/satsuma-cli.tgz
          ```

          **Install VS Code Extension:**
          Download `vscode-satsuma.vsix` and install via:
          ```bash
          code --install-extension vscode-satsuma.vsix
          ```
          EOF

          gh release create latest \
            --title "Latest build" \
            --notes-file notes.md \
            --prerelease \
            satsuma-cli.tgz \
            vscode-satsuma.vsix
