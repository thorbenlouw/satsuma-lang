name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: tooling/satsuma-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install all dependencies
        working-directory: .
        run: npm run ci:all

      - name: Bundle for distribution
        run: |
          # Replace file: symlink with actual copy (includes prebuilt native addon)
          rm -rf node_modules/tree-sitter-satsuma
          cp -rf ../tree-sitter-satsuma node_modules/tree-sitter-satsuma

          # Remove dev-only / non-runtime files from the bundled copy
          rm -rf node_modules/tree-sitter-satsuma/{test,scripts,.beads,docs,queries,examples}
          rm -rf node_modules/tree-sitter-satsuma/node_modules

          # Bundle all dependencies into the tarball so consumers skip native compilation
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.bundleDependencies = true;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          npm pack
          mv satsuma-cli-*.tgz satsuma-cli-${{ matrix.platform }}.tgz

      - uses: actions/upload-artifact@v4
        with:
          name: satsuma-cli-${{ matrix.platform }}
          path: tooling/satsuma-cli/satsuma-cli-${{ matrix.platform }}.tgz

  vsix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/vscode-satsuma
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install all dependencies
        working-directory: .
        run: npm run ci:all

      - name: Build and package .vsix
        run: |
          # Build the LSP server (needed for the extension)
          cd server && npx tsc && cd ..

          # Build client + server + webview bundles
          npm run build

          # Package the extension
          npx @vscode/vsce package --no-dependencies -o vscode-satsuma.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-satsuma-vsix
          path: tooling/vscode-satsuma/vscode-satsuma.vsix

  release:
    needs: [build, vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Delete existing latest release and tag if present
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          cat > notes.md <<'EOF'
          Auto-built from the latest `main` branch.

          **Install CLI:**
          ```bash
          # macOS (Apple Silicon)
          npm install -g https://github.com/${{ github.repository }}/releases/download/latest/satsuma-cli-darwin-arm64.tgz

          # Linux (x64)
          npm install -g https://github.com/${{ github.repository }}/releases/download/latest/satsuma-cli-linux-x64.tgz
          ```

          **Install VS Code Extension:**
          Download `vscode-satsuma.vsix` and install via:
          ```bash
          code --install-extension vscode-satsuma.vsix
          ```
          EOF

          gh release create latest \
            --title "Latest build" \
            --notes-file notes.md \
            --prerelease \
            satsuma-cli-*.tgz \
            vscode-satsuma.vsix
