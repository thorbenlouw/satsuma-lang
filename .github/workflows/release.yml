name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g. v0.4.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  security:
    name: Security gate
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write

  artifacts:
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install all dependencies
        run: npm run ci:all

      - name: Build WASM parser
        run: cd tooling/tree-sitter-satsuma && node_modules/.bin/tree-sitter build --wasm . -o tree-sitter-satsuma.wasm

      - name: Build distributable artifacts
        run: ./scripts/build-artifacts.sh

      - name: Smoke-test global install
        shell: bash
        run: |
          # Install from the just-built tarball and confirm the CLI is functional.
          npm install -g ./tooling/satsuma-cli/satsuma-cli.tgz
          satsuma --version

      - uses: actions/upload-artifact@v7
        with:
          name: satsuma-cli
          path: tooling/satsuma-cli/satsuma-cli.tgz

      - uses: actions/upload-artifact@v7
        with:
          name: vscode-satsuma-vsix
          path: tooling/vscode-satsuma/vscode-satsuma.vsix

      - uses: actions/upload-artifact@v7
        with:
          name: satsuma-lsp
          path: tooling/satsuma-lsp/satsuma-lsp.tgz

  release:
    needs: [artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Extract release notes from changelog
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          node <<'NODE' > release-notes.md
          const fs = require('fs');
          const tag = process.env.RELEASE_TAG;
          const lines = fs.readFileSync('CHANGELOG.md', 'utf8').split('\n');
          const heading = `## ${tag} — `;
          const startIndex = lines.findIndex((line) => line.startsWith(heading));

          if (startIndex === -1) {
            console.error(`No changelog section found for ${tag}`);
            process.exit(1);
          }

          let endIndex = lines.length;
          for (let index = startIndex + 1; index < lines.length; index += 1) {
            if (lines[index].startsWith('## ')) {
              endIndex = index;
              break;
            }
          }

          const notes = lines.slice(startIndex + 1, endIndex).join('\n').trim();
          if (!notes) {
            console.error(`Changelog section for ${tag} is empty`);
            process.exit(1);
          }

          process.stdout.write(`${notes}\n`);
          NODE

      - name: Rename release assets for tagged release
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          cp -f satsuma-cli.tgz "satsuma-cli-${RELEASE_TAG}.tgz"
          cp -f satsuma-lsp.tgz "satsuma-lsp-${RELEASE_TAG}.tgz"
          cp -f vscode-satsuma.vsix "vscode-satsuma-${RELEASE_TAG}.vsix"

      - name: Create tagged release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            "satsuma-cli-${RELEASE_TAG}.tgz" \
            "satsuma-lsp-${RELEASE_TAG}.tgz" \
            "vscode-satsuma-${RELEASE_TAG}.vsix"

      - name: Update latest release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Delete existing latest release and tag if present
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          cat > notes.md <<'EOF'
          Auto-built from the latest `main` branch.

          **Install CLI:**
          ```bash
          npm install -g https://github.com/${{ github.repository }}/releases/download/latest/satsuma-cli-latest.tgz
          ```

          **Install LSP:**
          ```bash
          npm install -g https://github.com/${{ github.repository }}/releases/download/latest/satsuma-lsp-latest.tgz
          ```

          **Install VS Code Extension:**
          Download `vscode-satsuma-latest.vsix` and install via:
          ```bash
          code --install-extension vscode-satsuma-latest.vsix
          ```
          EOF

          cp -f satsuma-cli.tgz satsuma-cli-latest.tgz
          cp -f satsuma-lsp.tgz satsuma-lsp-latest.tgz
          cp -f vscode-satsuma.vsix vscode-satsuma-latest.vsix

          gh release create latest \
            --title "Latest build" \
            --notes-file notes.md \
            --prerelease \
            satsuma-cli-latest.tgz \
            satsuma-lsp-latest.tgz \
            vscode-satsuma-latest.vsix
